<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VS Code Pets - Kucing Aktif Bergerak</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100vh;
        background-color: #1e1e1e;
        font-family: "Courier New", Courier, monospace;
        position: relative;
        cursor: crosshair;
      }

      #petunjuk {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        color: #858585;
        font-size: 14px;
        pointer-events: none;
        user-select: none;
      }

      #ground {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 80px;
        border-top: 2px dashed #333;
        background-color: #181818;
      }

      .kucing-container {
        position: absolute;
        bottom: 60px;
        left: 100px;
        width: 120px; /* Diperlebar agar emoji ganda tidak terpotong */
        height: 64px;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: transform 0.15s ease-in-out;
        transform-origin: center;
      }

      .kucing-sprite {
        font-size: 48px;
        user-select: none;
        display: inline-block;
        white-space: nowrap;
      }

      /* --- ANIMASI BERDASARKAN AKTIVITAS --- */

      /* Jalan Santai */
      .jalan {
        animation: animasiJalan 0.35s infinite alternate ease-in-out;
      }
      @keyframes animasiJalan {
        0% {
          transform: translateY(0) rotate(-6deg);
        }
        100% {
          transform: translateY(-8px) rotate(6deg);
        }
      }

      /* Berlari Kencang (Mengejar Klik Mouse) */
      .lari {
        animation: animasiLari 0.18s infinite alternate ease-in-out;
      }
      @keyframes animasiLari {
        0% {
          transform: translateY(0) scaleX(1.1) scaleY(0.85);
        }
        100% {
          transform: translateY(-12px) scaleX(0.85) scaleY(1.1);
        }
      }

      /* Diam / Mengendus / Penasaran / Nguap / Marah */
      .diam,
      .penasaran,
      .nguap,
      .marah,
      .menjilat,
      .duduk {
        animation: animasiDiam 0.8s infinite alternate ease-in-out;
      }
      @keyframes animasiDiam {
        0% {
          transform: scaleY(1) scaleX(1);
        }
        100% {
          transform: scaleY(0.9) scaleX(1.05);
        }
      }

      /* Istirahat Singkat / Tidur */
      .tidur {
        animation: animasiTidur 1.5s infinite alternate ease-in-out;
      }
      @keyframes animasiTidur {
        0% {
          transform: scale(0.95);
          opacity: 0.9;
        }
        100% {
          transform: scale(0.85);
          opacity: 0.6;
        }
      }

      /* Bermain / Cinta (Melompat Kegirangan) */
      .bermain,
      .cinta {
        animation: animasiBermain 0.4s infinite alternate ease-in-out;
      }
      @keyframes animasiBermain {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-20px);
        }
      }

      /* Kaget */
      .kaget {
        animation: animasiKaget 0.1s infinite;
      }
      @keyframes animasiKaget {
        0% {
          transform: scale(1.2) translateX(-2px);
        }
        100% {
          transform: scale(1.2) translateX(2px);
        }
      }

      /* Efek klik visual di lantai */
      .click-target {
        position: absolute;
        width: 12px;
        height: 12px;
        background: rgba(255, 165, 0, 0.5);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        animation: targetFade 0.5s forwards;
        pointer-events: none;
      }
      @keyframes targetFade {
        0% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(3);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="ground"></div>

    <div class="kucing-container" id="kucingContainer">
      <div class="kucing-sprite diam" id="kucingSprite">🐱</div>
    </div>

    <script>
      const container = document.getElementById("kucingContainer");
      const sprite = document.getElementById("kucingSprite");

      let currentX = 100;
      let targetX = 100;
      let speed = 2;
      let state = "diam";
      let facingRight = true;
      let AIInterval;

      function gantiState(statusBaru) {
        state = statusBaru;
        sprite.className = "kucing-sprite " + statusBaru;

        switch (statusBaru) {
          case "tidur":
            sprite.innerHTML = "😴🐱";
            break;
          case "lari":
            sprite.innerHTML = "🙀";
            break;
          case "jalan":
            sprite.innerHTML = "🐈";
            break;
          case "diam":
            sprite.innerHTML = "🐱";
            break;
          case "duduk":
            sprite.innerHTML = "😺";
            break;
          case "menjilat":
            sprite.innerHTML = "😽";
            break;
          case "bermain":
            sprite.innerHTML = "😸";
            break;
          case "penasaran":
            sprite.innerHTML = "🧐🐱";
            break;
          case "nguap":
            sprite.innerHTML = "🥱🐱";
            break;
          case "marah":
            sprite.innerHTML = "😾";
            break;
          case "cinta":
            sprite.innerHTML = "😻💕";
            break;
          case "kaget":
            sprite.innerHTML = "🙀";
            break;
          default:
            sprite.innerHTML = "🐱";
            break;
        }
      }

      // --- SISTEM GERAKAN ACAK AKTIF dengan Variasi State Baru ---
      function otakPetPetualang() {
        if (state === "lari") return;

        const keputusan = Math.random();

        if (keputusan < 0.5) {
          // 50% Peluang untuk berjalan ke lokasi acak baru
          const jarakMaksimumJalan = 400;
          const arahAcak = Math.random() < 0.5 ? -1 : 1;
          const langkahAcak = Math.random() * jarakMaksimumJalan * arahAcak;

          targetX = Math.max(
            20,
            Math.min(window.innerWidth - 130, currentX + langkahAcak),
          );
          speed = 2 + Math.random() * 1.5;
          gantiState("jalan");
        } else {
          // 50% Peluang diam di tempat dengan berbagai ekspresi emosi acak
          targetX = currentX;

          const pilihanEmosi = Math.random();
          if (pilihanEmosi < 0.15) {
            gantiState("diam");
          } else if (pilihanEmosi < 0.3) {
            gantiState("tidur");
          } else if (pilihanEmosi < 0.45) {
            gantiState("duduk");
          } else if (pilihanEmosi < 0.6) {
            gantiState("menjilat");
          } else if (pilihanEmosi < 0.7) {
            gantiState("penasaran");
          } else if (pilihanEmosi < 0.8) {
            gantiState("nguap");
          } else if (pilihanEmosi < 0.9) {
            gantiState("marah");
          } else {
            gantiState("bermain");
          }
        }
      }

      // Mesin Fisika Pergerakan Kucing
      function loopFisika() {
        const jarak = targetX - currentX;

        if (Math.abs(jarak) > speed) {
          // Membalikkan seluruh container ke kiri/kanan agar emoji ganda ikut berbalik dengan benar
          if (jarak > 0 && !facingRight) {
            facingRight = true;
            container.style.transform = "scaleX(1)";
          } else if (jarak < 0 && facingRight) {
            facingRight = false;
            container.style.transform = "scaleX(-1)";
          }

          currentX += Math.sign(jarak) * speed;
          container.style.left = currentX + "px";
        } else {
          currentX = targetX;
          container.style.left = currentX + "px";

          if (state === "lari") {
            // Ketika sampai di lokasi klik, beri respon emosi "cinta" atau "kaget" sebelum normal kembali
            gantiState(Math.random() < 0.7 ? "cinta" : "kaget");
            clearInterval(AIInterval);

            setTimeout(() => {
              gantiState("diam");
              mulaiUlangAI();
            }, 1500); // Tampilkan ekspresi selama 1,5 detik
          } else if (state === "jalan") {
            gantiState("diam");
          }
        }

        requestAnimationFrame(loopFisika);
      }

      function mulaiUlangAI() {
        clearInterval(AIInterval);
        AIInterval = setInterval(otakPetPetualang, 3500);
      }

      // Respons ketika Layar di-klik
      document.addEventListener("click", (e) => {
        const visualTarget = document.createElement("div");
        visualTarget.classList.add("click-target");
        visualTarget.style.left = e.clientX + "px";
        visualTarget.style.top = window.innerHeight - 50 + "px";
        document.body.appendChild(visualTarget);
        setTimeout(() => visualTarget.remove(), 500);

        targetX = Math.max(
          20,
          Math.min(window.innerWidth - 130, e.clientX - 60),
        );
        speed = 8;
        gantiState("lari");
      });

      // Inisialisasi awal
      loopFisika();
      otakPetPetualang();
      mulaiUlangAI();

      window.addEventListener("resize", () => {
        if (currentX > window.innerWidth) {
          currentX = window.innerWidth - 140;
          targetX = currentX;
        }
      });
    </script>
  </body>
</html>
